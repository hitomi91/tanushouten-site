<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="たぬ商店は、ちょっと便利なアプリを作っている個人開発者のサイトです。">
    <title>たぬ商店</title>
    <link rel="canonical" href="https://tanushouten.com/">
    <link rel="stylesheet" href="/assets/styles.css">
    <script src="/assets/script.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="site-logo" href="/" aria-label="たぬ商店 トップへ">たぬ商店</a>
      <nav class="site-nav" aria-label="メインナビゲーション">
        <a href="/privacy/">Privacy</a>
        <a href="/terms/">Terms</a>
        <a href="/tokushoho/">特商法</a>
      </nav>
    </header>

    <main>
      <section class="hero section">
        <div class="hero-copy">
          <p class="eyebrow">Independent App Studio</p>
          <h1>たぬ商店</h1>
          <p class="lead">ちょっと便利なアプリを作っています🌱</p>
        </div>
      </section>

      <section class="section app-section" aria-labelledby="apps-title">
        <div class="section-heading">
          <p class="eyebrow">Apps</p>
          <h2 id="apps-title">公開中アプリ一覧</h2>
        </div>

        <div class="app-list">
          <article class="app-card">
            <div>
              <h3>賃貸見積くん</h3>
              <p>賃貸契約の見積もりを、見やすく整理するためのアプリです。</p>
            </div>
            <a class="button" href="https://apps.apple.com/jp/search?term=%E8%B3%83%E8%B2%B8%E8%A6%8B%E7%A9%8D%E3%81%8F%E3%82%93" aria-label="賃貸見積くんをApp Storeで見る">App Store</a>
          </article>

          <article class="app-card">
            <div>
              <h3>おくすり電卓</h3>
              <p>お薬まわりの計算を、すばやく確認できるようにするアプリです。</p>
            </div>
            <span class="status">近日公開</span>
          </article>
        </div>
      </section>

      <section class="section contact-section" aria-labelledby="contact-title">
        <div class="contact-box">
          <div>
            <p class="eyebrow">Contact</p>
            <h2 id="contact-title">お問い合わせメール</h2>
          </div>
          <a class="mail-link" data-mail-user="support" data-mail-domain="tanushouten.com" href="#">taunshouten@gmail.com</a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <nav aria-label="フッターナビゲーション">
        <a href="/privacy/">プライバシーポリシー</a>
        <a href="/terms/">利用規約</a>
        <a href="/tokushoho/">特商法</a>
      </nav>
      <p>&copy; <span data-current-year>2026</span> たぬ商店</p>
    </footer>
  </body>
</html>
